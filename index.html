<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chinesisch Flashcards – Wort + Beispielsatz (v5.3)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>Flashcards <span class="muted">Deutsch ↔ 中文</span></h1>
      <p class="subtitle">Lektion wählen · Richtung & Reihenfolge wählen · Karte lernen</p>
    </header>

    <section class="card cfg">
      <div class="grid-2">
        <div class="pane">
          <div class="lbl">Lektion(en)</div>
          <select id="lessonSelect" class="select" multiple size="8"></select>
          <div class="controls mt8">
            <button id="btnUseLessons" class="btn">Übernehmen</button>
            <button id="btnClearLessons" class="btn ghost">Leeren</button>
          </div>
          <div id="excelStatus" class="mini mt8">Excel wird geladen…</div>
        </div>

        <div class="pane">
          <div class="lbl">Richtung</div>
          <div class="radio-row">
            <label><input type="radio" name="mode" value="de2zh" checked> 🇩🇪 → 🇨🇳 (DE→ZH)</label>
            <label><input type="radio" name="mode" value="zh2de"> 🇨🇳 → 🇩🇪 (ZH→DE)</label>
          </div>

          <div class="lbl mt12">Stimmen & Tempo</div>
          <div class="row voice-row">
            <div class="col">
              <div class="small">zh‑CN Stimme</div>
              <select id="zhVoiceSelect" class="select"></select>
            </div>
            <div class="col">
              <div class="small">de‑DE Stimme</div>
              <select id="deVoiceSelect" class="select"></select>
            </div>
          </div>
          <div class="mt8">
            <label class="lbl">Tempo <span id="rateVal" class="hint">(0.95)</span></label>
            <input id="rateRange" type="range" min="0.6" max="1.6" step="0.05" value="0.95" />
          </div>

          <div class="controls mt8">
            <button id="btnTestDE" class="btn ghost">DE testen</button>
            <button id="btnTestZH" class="btn ghost">中文测试</button>
            <button id="btnReloadVoices" class="btn">Stimmen neu laden</button>
          </div>

          <div class="stack mt12">
            <button id="btnStart" class="btn primary">Training starten ▶</button>
          </div>
        </div>
      </div>
    </section>

    <section class="card learn">
      <div class="section-title">Karte</div>

      <div id="promptBox" class="prompt-box">
        <div class="prompt-row">
          <div class="prompt-col">
            <div id="promptWord" class="prompt big">—</div>
            <div id="promptWordSub" class="prompt sub small">&nbsp;</div>
          </div>
        </div>
        <div class="prompt-row">
          <div class="prompt-col">
            <div id="promptSent" class="prompt">—</div>
          </div>
        </div>
      </div>

      <div class="solution">
        <div id="solBox" class="sol masked">
          <div class="sol-part">
            <div id="solWord" class="sol-text">—</div>
          </div>
          <div class="sol-part">
            <div id="solSent" class="sol-text">—</div>
          </div>
        </div>
      </div>

      <div class="card-controls">
        <button id="btnPrev" class="btn" disabled>◀ Zurück</button>
        <button id="btnReveal" class="btn ghost" disabled>Jetzt aufdecken 👁️</button>
        <button id="btnNext" class="btn" disabled>Nächste Karte ▶</button>
      </div>

      <div class="card-controls second">
        <button id="btnPlayQ" class="btn ghost" disabled>🔊 Frage abspielen</button>
        <button id="btnPlayA" class="btn ghost" disabled>🔊 Antwort abspielen</button>
      </div>

    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
